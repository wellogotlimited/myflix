name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # ← kills job if it takes longer than 10 mins
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          request_pty: true          # ← helps with long running scripts
          command_timeout: 10m       # ← ssh action specific timeout
          script: |
            sudo bash /home/test/htdocs/test.com/deploy.sh
